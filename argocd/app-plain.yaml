apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plain-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ammarhamed009/ArgoCD.git
    targetRevision: main
    path: app-plain
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
